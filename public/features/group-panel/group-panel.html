<div id="groupPanel" class="modal hidden">
  <div class="modal-content large">
    <header class="panel-header">
      <h3>Criar grupo</h3>
      <button id="closeGroupPanelButton" type="button" class="icon-button">
        ×
      </button>
    </header>

    <div class="modal-body">
      <label>
        Nome do grupo
        <input id="groupName" placeholder="Ex: Doidos do LG Chat" />
      </label>

      <label>
        Descrição
        <input id="groupDescription" placeholder="Descrição opcional" />
      </label>

      <p class="muted">Escolha membros para adicionar:</p>

      <div id="groupUsersList" class="users-list"></div>

      <button id="createGroupButton" type="button" class="primary-button">
        Criar grupo
      </button>
    </div>
  </div>
</div>
