<section id="authArea" class="auth-page">
  <div class="auth-wrapper">
    <div class="brand">
      <div class="brand-logo">LG</div>
      <h1>LG Chat</h1>
      <p>Converse em tempo real com segurança.</p>
    </div>

    <div class="auth-grid">
      <form id="loginForm" class="auth-card">
        <h2>Entrar</h2>
        <p class="muted">Acesse sua conta para continuar.</p>

        <label>
          Email
          <input
            id="loginEmail"
            type="email"
            placeholder="seu@email.com"
            autocomplete="email"
          />
        </label>

        <label>
          Senha
          <input
            id="loginSenha"
            type="password"
            placeholder="Sua senha"
            autocomplete="current-password"
          />
        </label>

        <button type="submit" class="primary-button">Entrar</button>
      </form>

      <form id="registerForm" class="auth-card">
        <h2>Criar conta</h2>
        <p class="muted">Crie uma conta para testar o chat.</p>

        <label>
          Nome
          <input id="registerNome" placeholder="Seu nome" autocomplete="name" />
        </label>

        <label>
          Email
          <input
            id="registerEmail"
            type="email"
            placeholder="seu@email.com"
            autocomplete="email"
          />
        </label>

        <label>
          Senha
          <input
            id="registerSenha"
            type="password"
            placeholder="Mínimo 8 caracteres"
            autocomplete="new-password"
          />
        </label>

        <button type="submit" class="secondary-button">Criar conta</button>
      </form>
    </div>
  </div>
</section>
